services:
  - type: web
    name: indotrade-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    plan: free

  - type: static
    name: indotrade-frontend
    staticPublishPath: ./frontend
    plan: free
