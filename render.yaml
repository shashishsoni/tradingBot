# Single Render Blueprint (repo root only). New → Blueprint → connect this GitHub repo.
# 1) Deploy once, copy the web service URL.
# 2) Set indotrade/frontend/js/config.js → window.INDOTRADE_API_BASE to that URL (no trailing slash).
# 3) Commit + push; static site will redeploy.
# 4) In the backend service, set FRONTEND_URL to your static site URL (optional; CORS defaults to *).

services:
  - type: web
    name: indotrade-backend
    env: node
    buildCommand: cd indotrade/backend && npm install
    startCommand: cd indotrade/backend && node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
    plan: free

  - type: static
    name: indotrade-frontend
    staticPublishPath: indotrade/frontend
    plan: free
